[pytest]
markers =
    unit: Unit tests (no external dependencies, mock ODPS)
    integration: Integration tests (require real ODPS connection)
    e2e: End-to-end tests (subprocess CLI invocation)
    eval: LLM-based skill evaluation (requires ANTHROPIC_API_KEY)
addopts = -m "not integration and not e2e and not eval"
testpaths = tests
