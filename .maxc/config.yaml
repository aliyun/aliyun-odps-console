default_project: demo_project
default_format: table
default_region: local
state_dir: .maxc/state
skill_dirs:
  - .maxc/skills

backend:
  type: auto

agent:
  auto_approve_cost_cu: 10
  safety_mode: strict
  audit_log: .maxc/state/audit.log

project_context: |
  业务上下文由当前项目维护。
  如果配置了真实 MaxCompute 环境变量，CLI 会优先使用环境中的 project / endpoint。
  如果没有真实连接信息，则回退到本地 mock catalog。

allowed_operations:
  - SELECT

cost_threshold_cu: 50
sensitive_columns:
  - user_phone
  - id_card_no
  - bank_account

catalog:
  tables:
    - name: dws_sale_province_1d
      description: 省份粒度销售汇总表
      row_count: 31
      partitions:
        - dt=2026-02-28
      upstream_tables:
        - dwd_trade_order
        - dwd_trade_refund
      downstream_tables:
        - ads_sale_dashboard
      columns:
        - name: province
          type: string
          comment: 省份
        - name: total_gmv
          type: double
          comment: 省份 GMV
        - name: order_cnt
          type: bigint
          comment: 订单数
        - name: dt
          type: string
          comment: 分区日期
      sample_rows:
        - province: 广东
          total_gmv: 98234567.0
          order_cnt: 123456
          dt: "2026-02-28"
        - province: 浙江
          total_gmv: 76123456.0
          order_cnt: 102345
          dt: "2026-02-28"
        - province: 江苏
          total_gmv: 70123456.0
          order_cnt: 98345
          dt: "2026-02-28"

    - name: dws_user_retention_1d
      description: 用户留存日汇总表
      row_count: 230000
      partitions:
        - dt=2026-02-28
      upstream_tables:
        - dwd_user_event_detail
        - dwd_trade_order
      downstream_tables:
        - ads_churn_cohort
      columns:
        - name: user_id
          type: string
          comment: 用户 ID
        - name: login_days_30d
          type: bigint
          comment: 近 30 天登录天数
        - name: order_cnt_30d
          type: bigint
          comment: 近 30 天下单次数
        - name: last_login_dt
          type: string
          comment: 最近登录日期
        - name: dt
          type: string
          comment: 分区日期
      sample_rows:
        - user_id: U1001
          login_days_30d: 0
          order_cnt_30d: 0
          last_login_dt: "2026-01-16"
          dt: "2026-02-28"
        - user_id: U1002
          login_days_30d: 1
          order_cnt_30d: 0
          last_login_dt: "2026-02-02"
          dt: "2026-02-28"
        - user_id: U1003
          login_days_30d: 5
          order_cnt_30d: 2
          last_login_dt: "2026-02-27"
          dt: "2026-02-28"

    - name: ads_user_profile
      description: 用户画像宽表
      row_count: 1500000
      partitions:
        - dt=2026-02-28
      upstream_tables:
        - dws_user_retention_1d
        - dim_city
      downstream_tables:
        - ads_user_segment
      columns:
        - name: user_id
          type: string
          comment: 用户 ID
        - name: city_tier
          type: string
          comment: 城市等级
        - name: age_group
          type: string
          comment: 年龄段
        - name: user_phone
          type: string
          comment: 手机号（敏感）
        - name: dt
          type: string
          comment: 分区日期
      sample_rows:
        - user_id: U1001
          city_tier: T1
          age_group: 25-34
          user_phone: "13800000001"
          dt: "2026-02-28"
        - user_id: U1002
          city_tier: T2
          age_group: 18-24
          user_phone: "13800000002"
          dt: "2026-02-28"
