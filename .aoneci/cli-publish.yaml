name: "maxc-cli PyInstaller 发布流水线"

# 触发：git tag push 或手动。
# 产物：PyInstaller onedir → tarball + sha256 → 上传到
#   https://maxcompute-repo.oss-cn-hangzhou.aliyuncs.com/maxc-cli/{version}/{platform}/
#
# 当前只跑 linux-amd64 单平台，目的是先验证 Aone CI 能否端到端跑通：
#   checkout → setup python → pip install → pyinstaller → pytest bundle → ossutil cp。
# 跑通后再扩到六平台 fan-in（见 plan Phase 2）。
#
# 故意不调用 publish_latest.sh：单平台发布不能 flip versions/latest。
# 六平台都齐了再单独跑一个 publish-latest job。

params:
  version:
    description: "发布版本号；tag 触发时自动取 git tag，手动/API 触发使用此参数"
    default: 'v0.0.0-ci-test'

jobs:
  build-and-upload:
    name: "构建 linux-amd64 onedir 并上传 OSS"
    steps:
      - uses: checkout
        id: 'downloadCode'

      - uses: setup-env
        inputs:
          python-version: "3.11"

      - id: 'parseVersion'
        run: |
          set -euo pipefail
          # PAC 会把未触发 tag 时的 ${{git.tag}} 渲染成字面量 "null"（非空串）；
          # 必须同时排除空串和 "null"。
          RAW_TAG='${{git.tag}}'
          RAW_PARAM_VER='${{params.version}}'
          if [ -n "${RAW_TAG}" ] && [ "${RAW_TAG}" != "null" ]; then
            VERSION="${RAW_TAG}"
          else
            VERSION="${RAW_PARAM_VER}"
          fi
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "ERR: 未能解析到合法 VERSION（git.tag 与 params.version 均为空或 null）" >&2
            exit 1
          fi
          # 去掉 v 前缀，OSS 路径用纯 semver: oss://.../0.2.5/ 而不是 v0.2.5/
          VERSION="${VERSION#v}"
          echo "==> using VERSION=${VERSION}"
          printf '%s' "${VERSION}" > "${{outputs.version.path}}"

      - id: 'buildBundle'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller pytest
          make release-build
          ls -la dist/release/

      - id: 'smokeBundle'
        run: |
          set -euo pipefail
          pytest tests/test_pyinstaller_bundle.py -v

      - id: 'uploadOSS'
        run: |
          set -euo pipefail
          export VERSION='${{steps.parseVersion.outputs.version}}'
          export PLATFORM=linux-amd64
          export INPUT_DIR=dist/release
          # OSS_BUCKET/REGION/PREFIX have sane defaults in the Makefile and
          # scripts, but set explicitly here so this file documents intent.
          export OSS_BUCKET=maxcompute-repo
          export OSS_REGION=cn-hangzhou
          export OSS_PREFIX=maxc-cli
          # NOTE: ossutil credentials are expected to come from the Aone CI
          # runner environment (typically OSS_ACCESS_KEY_ID /
          # OSS_ACCESS_KEY_SECRET, or a RAM role bound to the runner).
          # If the upload step fails with "missing credentials", configure
          # the secret on the Aone pipeline and re-run.
          bash scripts/upload_to_oss.sh
